name: ci

on:
  pull_request:
  push:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ggotAIorder/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e .[test]
      # 일부 테스트가 load_config()를 호출 → 형식상 유효한 더미 env 제공(실 네트워크는 fake 주입).
      - run: python -m pytest -q
        env:
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-key
          AES_ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
          GEMINI_API_KEY: dummy-gemini-key
          SHOP_KEY: "19"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ggotAIorder/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ggotAIorder/frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npm run build

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ggotAIhp/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: chmod +x ./gradlew
      - run: ./gradlew assembleDebug --no-daemon

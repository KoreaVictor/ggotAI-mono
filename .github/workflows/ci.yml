name: ci

on:
  pull_request:
  push:
    branches: [master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ggotAIorder/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e .[test]
      - run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ggotAIorder/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ggotAIorder/frontend/package-lock.json
      - run: npm ci
      - run: npx vitest run
      - run: npm run build

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ggotAIhp/android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: chmod +x ./gradlew
      - run: ./gradlew assembleDebug --no-daemon
